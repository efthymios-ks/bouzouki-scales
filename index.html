<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Μπουζοκοτεφτέρι</title>

    <link rel="icon" href="Assets/bouzouki.png" type="image/png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .nav-btn {
        border: none;
        background: none;
        padding: 0.5rem 1rem;
        font-weight: 500;
        color: #0d6efd;
        transition: background-color 0.2s, color 0.2s;
      }

      .nav-btn:hover {
        background-color: #e7f1ff;
        color: #084298;
        border-radius: 0.375rem;
      }

      .nav-btn.active {
        background-color: #0d6efd;
        color: #fff;
        border-radius: 0.375rem;
      }
    </style>
  </head>

  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm"
    >
      <div class="container justify-content-center">
        <div class="navbar-nav">
          <button
            class="nav-btn"
            data-section="scales-list-container"
            id="nav-scales-list"
          >
            Δρόμοι
          </button>
          <button
            class="nav-btn"
            data-section="scale-finder-container"
            id="nav-scale-finder"
          >
            Βρες το δρόμο
          </button>
          <button
            class="nav-btn"
            data-section="fretboard-container"
            id="nav-fretboard"
          >
            Ταστιέρα
          </button>
        </div>
      </div>
    </nav>

    <div
      class="container my-4 d-flex flex-column align-items-center"
      id="main-container"
    >
      <div
        id="scales-list-container"
        class="w-100"
        style="max-width: 700px"
      ></div>
      <div
        id="scale-finder-container"
        class="w-100"
        style="max-width: 700px"
      ></div>
      <div
        id="fretboard-container"
        class="w-100"
        style="max-width: 700px; display: none"
      >
        <div
          id="fretboard"
          data-layout="D,A,F,C"
          data-allow-select
          data-select-all-equal
        ></div>
      </div>
    </div>

    <script type="module" src="Features/Scales/ScalesComponent.js"></script>
    <script
      type="module"
      src="Features/Scales/ScaleFinderComponent.js"
    ></script>
    <script
      type="module"
      src="Features/Fretboard/FretboardComponent.js"
    ></script>

    <script>
      const navButtons = document.querySelectorAll(".nav-btn");
      const mainContainer = document.getElementById("main-container");
      const sections = Array.from(mainContainer.children);

      function showSection(sectionId) {
        sections.forEach((section) => {
          section.style.display = section.id === sectionId ? "block" : "none";
        });
        navButtons.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.section === sectionId);
        });
      }

      navButtons.forEach((btn) => {
        btn.addEventListener("click", () => showSection(btn.dataset.section));
      });

      showSection("scales-list-container");
    </script>
  </body>
</html>
